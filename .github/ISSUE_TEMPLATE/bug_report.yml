name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ProjectSend Version
      description: Which version are you running?
      placeholder: e.g., r1750
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP Version
      placeholder: e.g., 8.2.10

  - type: dropdown
    id: db_type
    attributes:
      label: Database Type
      options:
        - MySQL
        - MariaDB
        - Other

  - type: input
    id: db_version
    attributes:
      label: Database Version
      placeholder: e.g., MySQL 8.0, MariaDB 10.11

  - type: input
    id: web_server
    attributes:
      label: Web Server
      placeholder: e.g., Apache 2.4, Nginx 1.24

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g., Chrome 120, Firefox 121

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant error logs here.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
