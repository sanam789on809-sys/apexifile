<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%SUBJECT%</title>
    <style type="text/css">
        /* Creative Artistic Email Template */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 16px;
            line-height: 1.7;
            color: #2c2c2c;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        table {
            border-collapse: collapse;
        }

        .email-wrapper {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 0;
        }

        .email-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .decorative-border {
            height: 8px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
            background-size: 300% 100%;
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-section {
            background: linear-gradient(135deg, #2c3e50 0%, #4a6741 100%);
            padding: 50px 40px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" patternUnits="userSpaceOnUse" width="100" height="100"><circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="80" r="0.5" fill="rgba(255,255,255,0.05)"/><circle cx="40" cy="60" r="0.8" fill="rgba(255,255,255,0.08)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>') repeat;
            opacity: 0.3;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .header-logo {
            font-size: 36px;
            font-weight: 300;
            color: #ffffff;
            margin: 0 0 15px 0;
            letter-spacing: 3px;
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-tagline {
            font-size: 16px;
            color: #ecf0f1;
            margin: 0;
            opacity: 0.9;
            position: relative;
            z-index: 2;
            font-style: italic;
        }

        .content-section {
            padding: 50px 40px;
            background-color: #ffffff;
            position: relative;
        }

        .content-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(180deg, #f8f9fa 0%, rgba(248,249,250,0) 100%);
            pointer-events: none;
        }

        .artistic-divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            margin: 0 auto 30px;
            border-radius: 2px;
        }

        .content-title {
            font-size: 28px;
            font-weight: 300;
            color: #2c3e50;
            margin: 0 0 20px 0;
            text-align: center;
            position: relative;
        }

        .content-accent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .artistic-quote {
            border-left: 4px solid #ff6b6b;
            padding-left: 20px;
            margin: 30px 0;
            font-style: italic;
            color: #666;
        }

        .button-creative {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff !important;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 400;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .button-creative:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
        }

        /* Responsive */
        @media only screen and (max-width: 600px) {
            .email-container {
                margin: 0 15px !important;
                border-radius: 15px !important;
            }

            .header-section,
            .content-section {
                padding: 30px 25px !important;
            }

            .header-logo {
                font-size: 28px !important;
            }

            .content-title {
                font-size: 22px !important;
            }
        }
    </style>
</head>
<body>
    <table class="email-wrapper" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center">
                <table class="email-container" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td class="decorative-border"></td>
                    </tr>
                    <tr>
                        <td class="header-section">
                            <h1 class="header-logo">CGT</h1>
                            <p class="header-tagline">Where creativity meets functionality</p>
                        </td>
                    </tr>
                    <tr>
                        <td class="content-section">
                            <div class="artistic-divider"></div>
