<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{EMAIL_TITLE}}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.7;
            color: #333333;
            background-color: #ffffff;
        }
        .email-container {
            max-width: 580px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .header {
            padding: 60px 40px 40px 40px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }
        .header h1 {
            margin: 0;
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .content {
            padding: 40px;
        }
        .content h2 {
            color: #1a1a1a;
            font-size: 20px;
            font-weight: 400;
            margin: 0 0 30px 0;
            line-height: 1.4;
        }
        .content p {
            color: #555555;
            font-size: 15px;
            line-height: 1.7;
            margin: 0 0 25px 0;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin: 20px 0;
            border: 2px solid #1a1a1a;
            transition: all 0.2s ease;
        }
        .button:hover {
            background-color: #ffffff;
            color: #1a1a1a;
        }
        @media only screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
            }
            .header, .content {
                padding: 30px 20px !important;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <h1>{{SYSTEM_NAME}}</h1>
        </div>
        <div class="content">
