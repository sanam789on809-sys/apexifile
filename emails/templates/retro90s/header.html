<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>%SUBJECT%</title>
    <style type="text/css">
        /* Retro 90s Email Styling - Best viewed in Netscape Mail! */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 14px;
            background-color: #c0c0c0;
            color: #000000;
            line-height: 1.3;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
        }

        .main-table {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 3px outset #c0c0c0;
        }

        .header-cell {
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
            padding: 20px;
            text-align: center;
            border-bottom: 3px inset #c0c0c0;
        }

        .header-title {
            color: #000000;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #ffffff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-subtitle {
            color: #000080;
            font-size: 12px;
            margin: 5px 0 0 0;
            text-decoration: blink;
        }

        .content-cell {
            padding: 20px;
            background-color: #ffffff;
            border-left: 2px inset #c0c0c0;
            border-right: 2px inset #c0c0c0;
        }

        /* Classic 90s link styles */
        a:link { color: #0000ff; text-decoration: underline; }
        a:visited { color: #800080; text-decoration: underline; }
        a:hover { color: #ff0000; text-decoration: underline; background-color: #ffffcc; }
        a:active { color: #ff0000; text-decoration: underline; }

        .retro-hr {
            height: 3px;
            border: none;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            margin: 15px 0;
        }

        .blink {
            animation: blink 1s linear infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .marquee-text {
            background-color: #000000;
            color: #00ff00;
            padding: 5px;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            white-space: nowrap;
        }

        .under-construction {
            background-color: #ffff00;
            color: #000000;
            padding: 10px;
            border: 2px solid #ff0000;
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>

                <h1 class="header-title">✨ CGT ✨</h1>
                <p class="header-subtitle">🌟 Welcome to the Information SuperHighway! 🌟</p>
                <hr class="retro-hr">
            </td>
        </tr>
